version: '3.8'

volumes:
  prometheus_data: {}
  grafana_data: {}

services:
  prometheus: 
    image: docker.io/prom/prometheus
    container_name: fet-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command: 
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'

  blackbox-exporter:
    image: docker.io/prom/blackbox-exporter
    container_name: fet-front-monitor
    ports: 
      - "9115:9115"

  alertmanager:
    image: docker.io/prom/alertmanager
    container_name: fet-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml

  line-relay:
    build:
      context: ./relays/line
    container_name: line-relay
    env_file:
      - ./relays/line/.env
    ports:
      - "3000:3000"
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana-enterprise:latest
    container_name: fet-grafana
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"


