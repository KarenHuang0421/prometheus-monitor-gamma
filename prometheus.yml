global:
  scrape_interval: 15s
  evaluation_interval: 15s 
  external_labels:
    monitor: "codelab-monitor"

rule_files:
  - 'prometheus.rules.yml'

scrape_configs:

  - job_name: remote-node
    scheme: http
    scrape_interval: 5s
    static_configs:
      - targets: 
        - 10.0.5.31:9100
        # - apartment-sao-developments-projected.trycloudflare.com

  - job_name: 'blackbox-exporter'
    metrics_path: /probe
    params:
      module: [http_2xx] 

    static_configs:
      - targets:
        - http://10.0.5.31:8080
        # - https://cholesterol-afterwards-calculated-darwin.trycloudflare.com

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115  

alerting:
  alertmanagers:
    - static_configs:
      - targets: ['alertmanager:9093']
   
