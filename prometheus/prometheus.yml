global:
  scrape_interval: 15s
  evaluation_interval: 15s 
  external_labels:
    monitor: "codelab-monitor"

rule_files:
  - 'rules/container_alerts.yml'
  - 'rules/system_alerts.yml'

scrape_configs:

  - job_name: 'windows-exporter'
    scheme: https
    scrape_interval: 5s
    static_configs:
      - targets: 
        # - 10.0.5.31:9182
        # - fc-ok-immune-pads.trycloudflare.com
        # - pipeline-original-revolution-chevy.trycloudflare.com
        - 0191b08296e4.ngrok-free.app

  - job_name: 'blackbox-exporter'
    metrics_path: /probe
    params:
      module: [http_2xx] 

    static_configs:
      - targets:
        # - http://10.0.5.31:8080
        # - https://wealth-economies-club-difficulties.trycloudflare.com
        # - https://health-e-manager-dev-web.dev.viuto-aiot.com
        # - https://health-e-manager-dev-web.dev.viuto-aiot.com/api/User/profile
        - https://0191b08296e4.ngrok-free.app

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115  

alerting:
  alertmanagers:
    - static_configs:
      - targets: 
        - alertmanager:9093
   
