groups:
- name: system-alerts
  rules:

  - alert: HighCpuUsagePort9182
    expr: (1 - avg(irate(windows_cpu_time_total{mode="idle"}[30s]))) * 100 > 5
    for: 0s
    labels:
      severity: warning
    annotations:
      summary: "High CPU usage on instance {{ $labels.instance }}"
      description: "CPU使用率高於 5%，目前使用率為 {{ $value | printf \"%.2f\" }}%"

  - alert: HighMemoryUsagePort9182
    expr: (windows_cs_physical_memory_bytes{instance=~"10.0.5.31:9182"} - windows_os_physical_memory_free_bytes{instance=~"10.0.5.31:9182"}) / windows_cs_physical_memory_bytes{instance=~"10.0.5.31:9182"} * 100 > 70
    for: 0s
    labels:
      severity: warning
    annotations:
      summary: "High memory usage on instance {{ $labels.instance }}"
      description: "記憶體使用率高於 70%，目前使用率為 {{ $value | printf \"%.2f\" }}%"

